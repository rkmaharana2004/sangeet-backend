ame: Deploy API to Ubuntu

# This tells GitHub to run this script ONLY when you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Added to prevent timeout and handshake issues
          timeout: 60s
          command_timeout: 10m
          fingerprint: ""
          script: |
            # 1. Go into the project folder
            cd ~/sangeet-backend
            
            # 2. Pull the newest code from GitHub
            git pull origin main
            
            # 3. Rebuild and restart the Spring Boot Docker container
            sudo docker compose up -d --build